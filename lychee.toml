# Configuration for https://github.com/lycheeverse/lychee
# Checks links in the built Astro site under `site/dist/client/`.
# Run: `just lychee` (requires `just site-build` first).

max_concurrency = 20
timeout = 20
max_retries = 3

# Astro SSR pages (prerender = false) aren't written to dist/client,
# so lychee can't resolve them against the filesystem. They're valid
# routes on macosdb.com — excluded here, not broken.
exclude = [
    "^file://.*/(macos|xcode)/compare/?$",
]
