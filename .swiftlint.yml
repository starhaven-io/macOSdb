excluded:
  - .build
  - DerivedData
  - Package.swift

opt_in_rules:
  # Performance
  - array_init
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - reduce_into
  - sorted_first_last

  # Modern Swift
  - direct_return
  - implicit_return
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - self_binding
  - shorthand_optional_binding
  - superfluous_else

  # Safety
  - closure_body_length
  - enum_case_associated_values_count
  - expiring_todo
  - fatal_error_message
  - identical_operands
  - local_doc_comment
  - overridden_super_call
  - private_action
  - private_swiftui_state
  - return_value_from_void_function
  - unavailable_function
  - unowned_variable_capture
  - yoda_condition

  # Style
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - discouraged_none_name
  - discouraged_object_literal
  - explicit_init
  - fallthrough
  - file_name_no_space
  - joined_default_parameter
  - legacy_multiple
  - modifier_order
  - number_separator
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - toggle_bool
  - trailing_comma
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - todo
  - opening_brace

line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 3
  function_level: 3

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

closure_body_length:
  warning: 50
  error: 70

large_tuple:
  warning: 4
  error: 5
