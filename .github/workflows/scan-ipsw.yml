name: Scan IPSW

on:
  workflow_dispatch:
    inputs:
      ipsw_url:
        description: "IPSW download URL"
        required: true
        type: string
      release_name:
        description: "Release name (e.g. Sequoia, Tahoe)"
        required: false
        type: string
      release_date:
        description: "Release date (ISO 8601, e.g. 2025-04-02)"
        required: true
        type: string
      beta:
        description: "Is this a beta release?"
        required: false
        type: boolean
        default: false
      beta_number:
        description: "Beta number (e.g. 3)"
        required: false
        type: string
      rc:
        description: "Is this a Release Candidate?"
        required: false
        type: boolean
        default: false
      rc_number:
        description: "RC number (e.g. 2). Omit for just RC"
        required: false
        type: string
      device_specific:
        description: "Device-specific build (e.g. M3 launch build)"
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: scan
  cancel-in-progress: false

permissions: {}

jobs:
  scan:
    name: Scan
    runs-on: scanner
    permissions:
      contents: write # required to push branches
      pull-requests: write # required to create PRs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Clean workspace
        run: git clean -fdx data/releases/

      - name: Download IPSW
        env:
          IPSW_URL: ${{ inputs.ipsw_url }}
        run: |
          IPSW_FILE="${RUNNER_TEMP}/$(basename "${IPSW_URL%%\?*}")"
          curl -L -o "${IPSW_FILE}" "${IPSW_URL}"
          echo "IPSW_FILE=${IPSW_FILE}" >> "${GITHUB_ENV}"

      - name: Cache CLI build
        id: cache-cli
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .build/release/macosdb
          key: macosdb-cli-${{ hashFiles('Sources/**/*.swift', 'Package.swift', 'Package.resolved') }}

      - name: Build CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: swift build -c release --product macosdb

      - name: Scan IPSW
        env:
          IPSW_URL: ${{ inputs.ipsw_url }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_DATE: ${{ inputs.release_date }}
          IS_BETA: ${{ inputs.beta }}
          BETA_NUMBER: ${{ inputs.beta_number }}
          IS_RC: ${{ inputs.rc }}
          RC_NUMBER: ${{ inputs.rc_number }}
          IS_DEVICE_SPECIFIC: ${{ inputs.device_specific }}
        run: |
          SCAN_ARGS=(
            "${IPSW_FILE}"
            --output data/releases
            --release-date "${RELEASE_DATE}"
            --update-index
            --verbose
            --ipsw-url "${IPSW_URL}"
          )
          if [[ -n "${RELEASE_NAME}" ]]; then
            SCAN_ARGS+=(--release-name "${RELEASE_NAME}")
          fi
          if [[ "${IS_BETA}" == "true" ]]; then
            SCAN_ARGS+=(--beta)
          fi
          if [[ -n "${BETA_NUMBER}" ]]; then
            SCAN_ARGS+=(--beta-number "${BETA_NUMBER}")
          fi
          if [[ "${IS_RC}" == "true" ]]; then
            SCAN_ARGS+=(--rc)
          fi
          if [[ -n "${RC_NUMBER}" ]]; then
            SCAN_ARGS+=(--rc-number "${RC_NUMBER}")
          fi
          if [[ "${IS_DEVICE_SPECIFIC}" == "true" ]]; then
            SCAN_ARGS+=(--device-specific)
          fi
          .build/release/macosdb scan "${SCAN_ARGS[@]}"

      - name: Clean up IPSW
        if: always()
        run: rm -f "${IPSW_FILE}"

      - name: Verify scan output
        run: |
          NEW_FILES=$(git ls-files --others --exclude-standard 'data/releases/')
          FILE_COUNT=$(echo "${NEW_FILES}" | grep -c . || true)
          if [[ "${FILE_COUNT}" -ne 1 ]]; then
            echo "::error::Expected exactly 1 new release file, found ${FILE_COUNT}"
            exit 1
          fi
          BASENAME=$(basename "${NEW_FILES}" .json)
          BRANCH="feat/data-${BASENAME}"
          echo "SCAN_BRANCH=${BRANCH}" >> "${GITHUB_ENV}"
          echo "SCAN_BASENAME=${BASENAME}" >> "${GITHUB_ENV}"

      - name: Create branch and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git checkout -b "${SCAN_BRANCH}"
          git add data/
          git commit -m "feat(data): add ${SCAN_BASENAME}"
          git push -u origin "${SCAN_BRANCH}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IPSW_URL: ${{ inputs.ipsw_url }}
          RELEASE_DATE: ${{ inputs.release_date }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr create \
            --title "feat(data): add ${SCAN_BASENAME}" \
            --body "## Summary
          - Scanned from IPSW: \`${IPSW_URL}\`
          - Release date: ${RELEASE_DATE}

          Auto-generated by the [scan workflow](${RUN_URL})."
