name: Scan IPSW

on:
  workflow_dispatch:
    inputs:
      ipsw_url:
        description: "IPSW download URL"
        required: true
        type: string
      release_date:
        description: "Release date (ISO 8601, e.g. 2025-04-02). Defaults to today."
        required: false
        type: string
      beta:
        description: "Is this a beta release?"
        required: false
        type: boolean
        default: false
      beta_number:
        description: "Beta number (e.g. 3)"
        required: false
        type: string
      beta_revision:
        description: "Replacement beta revision (e.g. 2 for beta 3 v.2)"
        required: false
        type: string
      rc:
        description: "Is this a Release Candidate?"
        required: false
        type: boolean
        default: false
      rc_number:
        description: "RC number (e.g. 2). Omit for just RC"
        required: false
        type: string
      device_specific:
        description: "Device-specific build (e.g. M3 launch build)"
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: scan
  cancel-in-progress: false

permissions: {}

jobs:
  scan:
    name: Scan
    runs-on: scanner
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      base_sha: ${{ steps.sync.outputs.base_sha }}
      basename: ${{ steps.package-release.outputs.basename }}
      release_date: ${{ steps.release-date.outputs.release_date }}
      source_url: ${{ steps.resolve-ipsw.outputs.source_url }}
    steps:
      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "${GITHUB_PATH}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Sync working tree to latest main
        id: sync
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "base_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Clean workspace
        run: git clean -fdx data/macos/releases/

      - name: Resolve release date
        id: release-date
        env:
          INPUT_DATE: ${{ inputs.release_date }}
        run: |
          # Release dates are Pacific, not UTC: `date -u` rolled the day forward on evening scans.
          if [[ -z "${INPUT_DATE}" ]]; then
            RELEASE_DATE=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
            echo "No release_date provided; defaulting to today (${RELEASE_DATE} Pacific)"
          else
            if ! [[ "${INPUT_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::release_date '${INPUT_DATE}' is not ISO 8601 (YYYY-MM-DD)"
              exit 1
            fi
            TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
            if [[ "${INPUT_DATE}" > "${TODAY}" ]]; then
              echo "::error::release_date '${INPUT_DATE}' is in the future (today is ${TODAY} Pacific)"
              exit 1
            fi
            RELEASE_DATE="${INPUT_DATE}"
          fi
          echo "RELEASE_DATE=${RELEASE_DATE}" >> "${GITHUB_ENV}"
          echo "release_date=${RELEASE_DATE}" >> "${GITHUB_OUTPUT}"

      - name: Resolve IPSW path
        id: resolve-ipsw
        env:
          IPSW_URL: ${{ inputs.ipsw_url }}
        run: |
          if [[ ! "${IPSW_URL}" =~ ^https://updates\.cdn-apple\.com/.+\.ipsw([?#].*)?$ ]]; then
            echo "::error::Refusing IPSW URL '${IPSW_URL}': expected an https://updates.cdn-apple.com/... .ipsw URL."
            exit 1
          fi
          ORIG_NAME=$(basename "${IPSW_URL%%\?*}")
          if [[ ! "${ORIG_NAME}" =~ ^UniversalMac_[0-9]+(\.[0-9]+){1,2}_[A-Za-z0-9]+_Restore\.ipsw$ ]]; then
            echo "::error::Refusing IPSW filename '${ORIG_NAME}': expected UniversalMac_<version>_<build>_Restore.ipsw."
            exit 1
          fi
          VERSION=$(echo "${ORIG_NAME}" | sed -E 's/UniversalMac_([0-9.]+)_.*/\1/')
          BUILD=$(echo "${ORIG_NAME}" | sed -E 's/UniversalMac_[0-9.]+_([^_]+)_.*/\1/')
          MAJOR=${VERSION%%.*}
          # Route to the archive drive whose version range covers this major.
          # Drives mount at /Volumes/macOS-Archive-<range>: "LO-HI" (sealed) or
          # "LO+" (active). No hardcoded boundary, so adding or sealing a drive
          # needs no workflow edit.
          ARCHIVE_ROOT=""
          seen=()
          for vol in /Volumes/macOS-Archive-*; do
            [[ -d "${vol}" ]] || continue
            seen+=("${vol##*/}")
            suffix=${vol##*/macOS-Archive-}
            if [[ "${suffix}" =~ ^([0-9]+)\+$ ]]; then
              lo=${BASH_REMATCH[1]}; hi=999999
            elif [[ "${suffix}" =~ ^([0-9]+)-([0-9]+)$ ]]; then
              lo=${BASH_REMATCH[1]}; hi=${BASH_REMATCH[2]}
            else
              continue
            fi
            if (( MAJOR >= lo && MAJOR <= hi )); then
              if [[ -n "${ARCHIVE_ROOT}" ]]; then
                echo "::error::macOS ${MAJOR} matches multiple archive drives (${ARCHIVE_ROOT}, ${vol})."
                exit 1
              fi
              ARCHIVE_ROOT="${vol}"
            fi
          done
          if [[ -z "${ARCHIVE_ROOT}" ]]; then
            echo "::error::No mounted archive drive covers macOS ${MAJOR}. Mounted: ${seen[*]:-none}."
            exit 1
          fi
          IPSW_DIR="${ARCHIVE_ROOT}/macOS/${MAJOR}"
          mkdir -p "${IPSW_DIR}"
          IPSW_FILE="${IPSW_DIR}/macOS-${VERSION}-${BUILD}.ipsw"
          echo "IPSW_FILE=${IPSW_FILE}" >> "${GITHUB_ENV}"
          echo "source_url=${IPSW_URL}" >> "${GITHUB_OUTPUT}"

      - name: Restore CLI build cache
        id: cache-cli
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build/release/macosdb
          key: macosdb-cli-${{ hashFiles('Sources/**/*.swift', 'Package.swift', 'Package.resolved') }}

      - name: Build CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: swift build -c release --product macosdb

      - name: Save CLI build cache
        if: steps.cache-cli.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build/release/macosdb
          key: macosdb-cli-${{ hashFiles('Sources/**/*.swift', 'Package.swift', 'Package.resolved') }}

      - name: Download IPSW
        env:
          IPSW_URL: ${{ inputs.ipsw_url }}
        run: |
          if [[ -f "${IPSW_FILE}" ]]; then
            echo "IPSW already cached at ${IPSW_FILE}, skipping download"
          else
            TOTAL=$(curl -fsSLI --retry 5 --retry-connrefused "${IPSW_URL}" | grep -i content-length | tail -1 | tr -dc '0-9' || true)
            if [[ -n "${TOTAL}" ]] && (( TOTAL > 0 )); then
              TOTAL_MB=$(( TOTAL / 1048576 ))
              TOTAL_GB=$(( TOTAL_MB * 10 / 1024 ))
              echo "Downloading IPSW ($(( TOTAL_GB / 10 )).$(( TOTAL_GB % 10 )) GB)..."
            else
              TOTAL_MB=0
              echo "Downloading IPSW (unknown size)..."
            fi
            curl -fsSL --retry 10 --retry-delay 10 --retry-connrefused --retry-all-errors -C - -o "${IPSW_FILE}.part" "${IPSW_URL}" &
            CURL_PID=$!
            while kill -0 "${CURL_PID}" 2>/dev/null; do
              if [[ -f "${IPSW_FILE}.part" ]]; then
                SIZE=$(stat -f%z "${IPSW_FILE}.part" 2>/dev/null || echo 0)
                SIZE_MB=$(( SIZE / 1048576 ))
                if (( TOTAL_MB > 0 )); then
                  PCT=$(( SIZE_MB * 100 / TOTAL_MB ))
                  echo "${PCT}% (${SIZE_MB} MB / ${TOTAL_MB} MB)"
                else
                  echo "${SIZE_MB} MB downloaded"
                fi
              fi
              sleep 30
            done
            wait "${CURL_PID}"
            mv "${IPSW_FILE}.part" "${IPSW_FILE}"
          fi

      - name: Set IPSW modification time to release date
        run: |
          TOUCH_DATE=$(echo "${RELEASE_DATE}" | tr -d '-')0000
          touch -t "${TOUCH_DATE}" "${IPSW_FILE}"

      - name: Scan IPSW
        env:
          IPSW_URL: ${{ inputs.ipsw_url }}
          IS_BETA: ${{ inputs.beta }}
          BETA_NUMBER: ${{ inputs.beta_number }}
          BETA_REVISION: ${{ inputs.beta_revision }}
          IS_RC: ${{ inputs.rc }}
          RC_NUMBER: ${{ inputs.rc_number }}
          IS_DEVICE_SPECIFIC: ${{ inputs.device_specific }}
        run: |
          SCAN_ARGS=(
            "${IPSW_FILE}"
            --output data/macos/releases
            --release-date "${RELEASE_DATE}"
            --update-index
            --verbose
            --save-aea-key
            --ipsw-url "${IPSW_URL}"
          )
          if [[ "${IS_BETA}" == "true" ]]; then
            SCAN_ARGS+=(--beta)
          fi
          if [[ -n "${BETA_NUMBER}" ]]; then
            SCAN_ARGS+=(--beta-number "${BETA_NUMBER}")
          fi
          if [[ -n "${BETA_REVISION}" ]]; then
            SCAN_ARGS+=(--beta-revision "${BETA_REVISION}")
          fi
          if [[ "${IS_RC}" == "true" ]]; then
            SCAN_ARGS+=(--rc)
          fi
          if [[ -n "${RC_NUMBER}" ]]; then
            SCAN_ARGS+=(--rc-number "${RC_NUMBER}")
          fi
          if [[ "${IS_DEVICE_SPECIFIC}" == "true" ]]; then
            SCAN_ARGS+=(--device-specific)
          fi
          .build/release/macosdb scan "${SCAN_ARGS[@]}"

      - name: Lint JSON
        run: python3 scripts/lint-json.py

      - name: Generate SHA-256 sidecar
        run: .build/release/macosdb validate "${IPSW_FILE}"

      - name: Lock archive files
        run: |
          touch -r "${IPSW_FILE}" "${IPSW_FILE}.sha256"
          for f in "${IPSW_FILE}" "${IPSW_FILE}.pem" "${IPSW_FILE}.sha256"; do
            [[ -f "$f" ]] && chflags uchg "$f"
          done

      - name: Package release JSON
        id: package-release
        run: |
          NEW_RELEASE_FILE=""
          MATCHES=0
          while IFS= read -r file; do
            [[ -n "${file}" ]] || continue
            NEW_RELEASE_FILE="${file}"
            MATCHES=$((MATCHES + 1))
          done < <(git ls-files --others --exclude-standard 'data/macos/releases/')

          if (( MATCHES != 1 )); then
            echo "::error::Expected exactly one new macOS release JSON file, found ${MATCHES}."
            exit 1
          fi
          if [[ ! "${NEW_RELEASE_FILE}" =~ ^data/macos/releases/[0-9]+/macOS-[^/]+\.json$ ]]; then
            echo "::error::Unexpected release JSON path: ${NEW_RELEASE_FILE}"
            exit 1
          fi

          /usr/bin/tar --no-mac-metadata --no-xattrs -czf "${RUNNER_TEMP}/release-json.tgz" data/macos/releases.json "${NEW_RELEASE_FILE}"
          echo "basename=$(basename "${NEW_RELEASE_FILE}" .json)" >> "${GITHUB_OUTPUT}"

      - name: Upload release JSON artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-json
          path: ${{ runner.temp }}/release-json.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish
    needs: scan
    runs-on: ubuntu-slim
    timeout-minutes: 60
    environment:
      name: starhaven
      deployment: false
    outputs:
      pr_number: ${{ steps.open-pr.outputs.pr_number }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.scan.outputs.base_sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Download release JSON artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-json
          path: ${{ runner.temp }}/artifact

      - name: Verify and overlay release JSON
        run: |
          python3 - <<'PY'
          import os
          import re
          import shutil
          import sys
          import tarfile
          from pathlib import Path

          tgz = Path(os.environ["RUNNER_TEMP"]) / "artifact" / "release-json.tgz"
          if not tgz.is_file():
              print(f"::error::Missing release JSON artifact at {tgz}", file=sys.stderr)
              sys.exit(1)

          index_path = "data/macos/releases.json"
          release_re = re.compile(r"^data/macos/releases/[0-9]+/macOS-[^/]+\.json$")
          index_members = []
          release_members = []

          with tarfile.open(tgz, "r:gz") as archive:
              for member in archive.getmembers():
                  parts = Path(member.name).parts
                  if member.name.startswith("/") or ".." in parts:
                      print(f"::error::Unsafe artifact path: {member.name}", file=sys.stderr)
                      sys.exit(1)
                  if not member.isfile():
                      print(f"::error::Artifact contains a non-regular file: {member.name}", file=sys.stderr)
                      sys.exit(1)

                  if member.name == index_path:
                      index_members.append(member)
                  elif release_re.fullmatch(member.name):
                      release_members.append(member)
                  else:
                      print(f"::error::Unexpected artifact entry: {member.name}", file=sys.stderr)
                      sys.exit(1)

              if len(index_members) != 1 or len(release_members) != 1:
                  print("::error::Artifact must contain one macOS releases.json and one release JSON file.", file=sys.stderr)
                  sys.exit(1)

              for member in (index_members[0], release_members[0]):
                  source = archive.extractfile(member)
                  if source is None:
                      print(f"::error::Could not read artifact entry: {member.name}", file=sys.stderr)
                      sys.exit(1)
                  target = Path(member.name)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with target.open("wb") as destination:
                      shutil.copyfileobj(source, destination)
          PY

      - name: Lint JSON
        run: python3 scripts/lint-json.py

      - name: Mint bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create signed commit and open PR
        id: open-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_URL: ${{ needs.scan.outputs.source_url }}
          RELEASE_DATE: ${{ needs.scan.outputs.release_date }}
          BASENAME: ${{ needs.scan.outputs.basename }}
          BASE_SHA: ${{ needs.scan.outputs.base_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          BOT_USER="${APP_SLUG}[bot]"
          BOT_ID=$(gh api "/users/${BOT_USER}" --jq .id)

          BRANCH="feat/data-${BASENAME}"
          TITLE="feat(data): add ${BASENAME}"
          printf -v PR_BODY "## Summary\n- Scanned from IPSW: \`%s\`\n- Release date: %s\n\nAuto-generated by the [scan workflow](%s)." \
            "${SOURCE_URL}" "${RELEASE_DATE}" "${RUN_URL}"
          COMMIT_BODY="Signed-off-by: ${BOT_USER} <${BOT_ID}+${BOT_USER}@users.noreply.github.com>"

          if [[ -n "${TRIGGERING_ACTOR}" ]]; then
            ACTOR_NAME=$(gh api "/users/${TRIGGERING_ACTOR}" --jq '.name // .login')
            ACTOR_EMAIL=$(gh api "/users/${TRIGGERING_ACTOR}" --jq '.email // "\(.id)+\(.login)@users.noreply.github.com"')
            COAUTHOR="Co-authored-by: ${ACTOR_NAME} <${ACTOR_EMAIL}>"
            COMMIT_BODY="${COMMIT_BODY}"$'\n'"${COAUTHOR}"
          fi

          # Stage untracked files as intent-to-add so git diff sees them.
          git add -N data/macos/
          DIFF_FILES=$(git diff --name-only HEAD -- data/macos/)
          if [[ -z "${DIFF_FILES}" ]]; then
            echo "::error::No macOS data changes found after overlaying scan artifact."
            exit 1
          fi
          ADDITIONS=$(
            printf '%s\n' "${DIFF_FILES}" |
            while IFS= read -r file; do
              CONTENT=$(base64 < "$file" | tr -d '\n')
              # shellcheck disable=SC2016 # jq needs literal jq variable names.
              jq -n --arg path "$file" --arg contents "$CONTENT" \
                '{path: $path, contents: $contents}'
            done | jq -s .
          )

          gh api "repos/${REPOSITORY}/git/refs" -X POST \
            -f "ref=refs/heads/${BRANCH}" \
            -f "sha=${BASE_SHA}"

          # shellcheck disable=SC2016 # jq needs literal GraphQL variable names.
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg branch "${BRANCH}" \
            --arg title "${TITLE}" \
            --arg body "${COMMIT_BODY}" \
            --arg head "${BASE_SHA}" \
            --argjson additions "${ADDITIONS}" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $title, body: $body },
                  fileChanges: { additions: $additions },
                  expectedHeadOid: $head
                }
              }
            }' | gh api graphql --input -

          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "${TITLE}" \
            --body "${PR_BODY}")
          PR_NUMBER="${PR_URL##*/}"
          if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not parse pull request number from gh output: ${PR_URL}"
            exit 1
          fi
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"

          gh pr merge "${BRANCH}" --squash --auto --delete-branch --body "${COMMIT_BODY}"

  wait-for-merge:
    name: Wait for merge
    needs: publish
    runs-on: ubuntu-slim
    timeout-minutes: 30
    permissions:
      pull-requests: read # required to poll auto-merge status without the app token
    steps:
      - name: Wait for PR to merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.publish.outputs.pr_number }}
        run: |
          if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid pull request number: ${PR_NUMBER}"
            exit 1
          fi
          echo "Waiting for PR #${PR_NUMBER} to merge..."
          while true; do
            STATE=$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json state -q .state 2>/dev/null || true)
            case "${STATE}" in
              MERGED) echo "PR merged successfully"; exit 0 ;;
              CLOSED) echo "::error::PR was closed without merging"; exit 1 ;;
            esac
            sleep 30
          done
