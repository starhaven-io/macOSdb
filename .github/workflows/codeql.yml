name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "Sources/**"
      - "Package.swift"
      - "Package.resolved"

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@ca53feb55a6153eb56aec343972368432fdbc5c3 # v2026.07.20.1
    with:
      languages: '["swift"]'
      runner: "macos-26"
      timeout-minutes: 30
      build-mode: "manual"
      build-profile: "swift-package"
