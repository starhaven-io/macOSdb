name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "Sources/**"
      - "Package.swift"
      - "Package.resolved"

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Analyze
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    uses: starhaven-io/.github/.github/workflows/reusable-codeql.yml@a11eda1f0ced9bbcc1ee297dbb19d38fe8c19323 # v2026.07.16.2
    with:
      languages: '["swift"]'
      runner: "macos-26"
      timeout-minutes: 30
      build-mode: "manual"
      build-profile: "swift-package"
