name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  # PR body/title edits fire `edited` events; give them their own per-run group so
  # they can't cancel in-flight tests from the preceding `opened`/`synchronize` run.
  group: ${{ github.event.action == 'edited' && format('ci-edit-{0}-{1}', github.ref, github.run_id) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions: {}

jobs:
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CI matrix
        id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Push to main: run test-tsan so Codecov has a baseline for PR
          # coverage comparisons.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            echo 'matrix=[{"name":"Test (Thread Sanitizer)","check":"test-tsan","runner":"macos-26","sanitize":"thread","coverage":"true","environment":"codecov"}]' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          MATRIX='[]'
          add_check() {
            local entry="$1"
            if [[ "${MATRIX}" == "[]" ]]; then
              MATRIX="[${entry}]"
            else
              MATRIX="${MATRIX%]},${entry}]"
            fi
          }

          # `edited` (title/body/base) also runs the full path-derived matrix. The
          # aggregate "conclusion" job is the only required status check, so it must
          # certify every relevant leg for the current commit. Collapsing to a
          # commits-only matrix on `edited` lets a green run overwrite a prior failing
          # one on the same SHA, bypassing tests, lint-json, CodeQL and the rest.
          CHANGED=$(git diff --name-only "${BASE_SHA}...HEAD")

          # Swift, CI workflow, or project tooling changes: lint + sanitizer tests.
          # Tooling paths (scripts/, justfile, hooks, lint configs) are included so a
          # PR touching only those can't merge having run nothing but the commits leg.
          if echo "${CHANGED}" | grep -qE '\.swift$|^Package\.(swift|resolved)$|^\.swiftlint\.yml$|^\.github/workflows/ci\.yml$|^scripts/|^justfile$|^\.githooks/|^_typos\.toml$|^lychee\.toml$'; then
            add_check '{"name":"Lint","check":"lint","runner":"macos-26"}'
            add_check '{"name":"Test (Thread Sanitizer)","check":"test-tsan","runner":"macos-26","sanitize":"thread","coverage":"true","environment":"codecov"}'
            add_check '{"name":"Test (Address Sanitizer)","check":"test-asan","runner":"macos-26","sanitize":"address"}'
          fi

          # Source changes: CodeQL
          if echo "${CHANGED}" | grep -qE '^Sources/|^Package\.(swift|resolved)$'; then
            add_check '{"name":"CodeQL","check":"codeql","runner":"macos-26"}'
          fi

          # Data changes — and changes to the linter that gates them — run lint-json
          # so a modified scripts/lint-json.py is re-validated against existing data.
          if echo "${CHANGED}" | grep -qE '^data/|^scripts/'; then
            add_check '{"name":"Lint JSON","check":"lint-json","runner":"ubuntu-slim"}'
          fi

          # Site or data changes: format check + build
          if echo "${CHANGED}" | grep -qE '^site/|^data/'; then
            add_check '{"name":"Site","check":"site","runner":"ubuntu-slim"}'
          fi

          # Workflow changes: Actions security audit
          if echo "${CHANGED}" | grep -qE '^\.github/workflows/'; then
            add_check '{"name":"zizmor","check":"zizmor","runner":"ubuntu-24.04"}'
          fi

          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read # required to read PR titles
    uses: starhaven-io/.github/.github/workflows/reusable-conventional-commits.yml@5f266219bb9c86c8c24f7743bbbe9accb665010c # v2026.07.05.6

  check:
    name: ${{ matrix.name }}
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    environment:
      name: ${{ matrix.environment }}
      deployment: false
    permissions:
      contents: read
      security-events: write # required for CodeQL and zizmor SARIF uploads
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ matrix.fetch_depth || 1 }}
          persist-credentials: false


      - name: Install lint tools
        if: matrix.check == 'lint'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_ENV_HINTS: 1
        run: brew install swiftlint typos-cli

      - name: SwiftLint
        if: matrix.check == 'lint'
        run: swiftlint --strict

      - name: Typos
        if: matrix.check == 'lint'
        run: typos


      - name: Lint JSON
        if: matrix.check == 'lint-json'
        run: python3 scripts/lint-json.py


      - name: Setup Node
        if: matrix.check == 'site'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Install site dependencies
        if: matrix.check == 'site'
        working-directory: site
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Check formatting
        if: matrix.check == 'site'
        working-directory: site
        run: npm run format:check

      - name: Build site
        if: matrix.check == 'site'
        working-directory: site
        run: npm run build

      - name: Deploy dry-run
        if: matrix.check == 'site'
        working-directory: site
        run: npm run deploy:dry
        env:
          WRANGLER_SEND_METRICS: "false"


      - name: Test
        if: startsWith(matrix.check, 'test-')
        env:
          SANITIZE: ${{ matrix.sanitize }}
          COVERAGE: ${{ matrix.coverage }}
        run: |
          swift test --sanitize "${SANITIZE}" ${COVERAGE:+--enable-code-coverage}

      - name: Export LCOV for Codecov
        if: success() && matrix.check == 'test-tsan'
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA="${BIN_PATH}/codecov/default.profdata"
          if [[ ! -f "${PROFDATA}" ]]; then
            echo "::error::No coverage profdata at ${PROFDATA}"
            exit 1
          fi
          BINARY_ARGS=()
          FIRST=""
          while IFS= read -r xctest; do
            name=$(basename "${xctest}" .xctest)
            bin="${xctest}/Contents/MacOS/${name}"
            [[ -f "${bin}" ]] || continue
            if [[ -z "${FIRST}" ]]; then FIRST="${bin}"; else BINARY_ARGS+=(-object "${bin}"); fi
          done < <(find "${BIN_PATH}" -name '*.xctest' -type d)
          if [[ -z "${FIRST}" ]]; then
            echo "::error::No xctest binaries found under ${BIN_PATH}"
            exit 1
          fi
          xcrun llvm-cov export -format=lcov \
            -ignore-filename-regex='(Tests/|\.build/|/Checkouts/|/SourcePackages/)' \
            "${FIRST}" \
            ${BINARY_ARGS[@]+"${BINARY_ARGS[@]}"} \
            -instr-profile="${PROFDATA}" \
            > coverage.lcov
          echo "lcov: $(wc -l < coverage.lcov) lines"

      - name: Upload coverage to Codecov
        if: success() && matrix.check == 'test-tsan'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: false


      - name: Initialize CodeQL
        if: matrix.check == 'codeql'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: swift
          build-mode: manual

      - name: Build for CodeQL
        if: matrix.check == 'codeql'
        run: swift build

      - name: CodeQL Analysis
        if: matrix.check == 'codeql'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:swift"


      - name: Run zizmor
        if: matrix.check == 'zizmor'
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: auditor

  conclusion:
    name: conclusion
    needs: [commits, check]
    runs-on: ubuntu-slim
    timeout-minutes: 15
    if: always()
    steps:
      - name: Result
        env:
          COMMITS_RESULT: ${{ needs.commits.result }}
          CHECK_RESULT: ${{ needs.check.result }}
        run: |
          test "${COMMITS_RESULT}" = "success" || test "${COMMITS_RESULT}" = "skipped"
          test "${CHECK_RESULT}" = "success" || test "${CHECK_RESULT}" = "skipped"
