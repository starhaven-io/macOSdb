name: JSON Lint

on:
  pull_request:
    paths:
      - "data/**/*.json"
      - ".github/workflows/json-lint.yml"

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: "json-lint-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: JSON Lint
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate JSON
        run: |
          failed=0
          while IFS= read -r file; do
            if ! jq empty "$file" 2>&1; then
              echo "::error file=$file::Invalid JSON"
              failed=1
            fi
          done < <(find data -name '*.json' -type f)
          exit $failed
