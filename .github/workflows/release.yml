name: Release

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}

jobs:
  build:
    name: Build
    # Releases come from main only — a dispatch from any other branch would
    # tag and publish whatever that branch contains. Guarding the entry job
    # skips the whole chain via `needs`.
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    environment:
      name: release
      deployment: false
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact: ${{ steps.package.outputs.artifact }}
    permissions:
      contents: read
      attestations: write # required to generate build provenance attestations
      id-token: write # required to generate build provenance attestations
    env:
      TEMPORARY_KEYCHAIN_FILE: "macosdb_signing.keychain-db"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 'static let current' Sources/macosdb/Version.swift | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not extract version from Sources/macosdb/Version.swift"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and unlock temporary macOS keychain
        run: |
          TEMPORARY_KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          TEMPORARY_KEYCHAIN_PATH="${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          security create-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${TEMPORARY_KEYCHAIN_PATH}"
          security unlock-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"

      - name: Import certificate into keychain
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set +x  # don't xtrace the certificate or its password
          echo -n "${DEVELOPER_ID_CERTIFICATE}" | base64 --decode --output="${RUNNER_TEMP}/certificate.p12"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" \
            -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -t cert -f pkcs12 -A
          rm -f "${RUNNER_TEMP}/certificate.p12"
          security list-keychain -d user -s "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"

      - name: Build release binary
        run: |
          swift build -c release --arch arm64 --product macosdb
          echo "BINARY=$(swift build -c release --arch arm64 --show-bin-path)/macosdb" >> "${GITHUB_ENV}"

      - name: Codesign binary
        run: |
          codesign --sign "Developer ID Application: Patrick Linnane (${DEVELOPMENT_TEAM})" \
            --options runtime \
            "${BINARY}"

      # A bare CLI binary cannot be stapled, so notarization is verified online by
      # Gatekeeper on first run. The cask quarantines on install, so that check runs;
      # the notarytool submission is what makes it pass.
      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          set +x  # keep the notarization password out of the xtrace log
          mkdir -p "${RUNNER_TEMP}/notarize-staging"
          cp "${BINARY}" "${RUNNER_TEMP}/notarize-staging/"
          ditto -c -k "${RUNNER_TEMP}/notarize-staging" "${RUNNER_TEMP}/macosdb-notarize.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/macosdb-notarize.zip" \
            --apple-id "${APPLE_ID}" \
            --team-id "${DEVELOPMENT_TEAM}" \
            --password "${NOTARIZATION_PASSWORD}" \
            --wait

      - name: Clean up temporary keychain
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" ]]; then
            security delete-keychain "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          fi

      - name: Package
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ARTIFACT="macosdb-${VERSION}-aarch64-apple-darwin"
          mkdir -p staging
          cp "${BINARY}" staging/macosdb
          cp LICENSE staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .
          echo "artifact=${ARTIFACT}" >> "${GITHUB_OUTPUT}"

      - name: Generate build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "${{ steps.package.outputs.artifact }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: "${{ steps.package.outputs.artifact }}.tar.gz"
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-slim
    environment:
      name: release
      deployment: false
    permissions:
      contents: write # required to create tags and GitHub releases
    outputs:
      version: ${{ needs.build.outputs.version }}
    env:
      TAG: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gh api "repos/${REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${COMMIT_SHA}"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "${TAG}" \
            --repo "${REPOSITORY}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/**/*.tar.gz
          gh release view "${TAG}" \
            --repo "${REPOSITORY}" \
            --json body \
            --jq '.body' > "${RUNNER_TEMP}/raw_notes.md"

      - name: Format release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/format-release-notes.py \
            "${RUNNER_TEMP}/raw_notes.md" "${TAG}" \
            > "${RUNNER_TEMP}/formatted_notes.md"
          gh release edit "${TAG}" \
            --repo "${REPOSITORY}" \
            --notes-file "${RUNNER_TEMP}/formatted_notes.md"

  bump-cask:
    name: Bump Homebrew cask
    needs: release
    runs-on: macos-26
    environment:
      name: release
      deployment: false
    permissions: {}
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Mint bot token for tap
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      # REVIEW (yours): the `macosdb` cask in starhaven-io/homebrew-tap needs a
      # `binary "macosdb"` stanza pointing at the macosdb-<version>-aarch64-apple-darwin
      # tarball before the first 2.0.0 release; bump-cask-pr only bumps the version
      # and sha of an already-correct cask.
      - name: Bump Homebrew cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.tap-token.outputs.token }}
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_ENV_HINTS: 1
          APP_SLUG: ${{ steps.tap-token.outputs.app-slug }}
        run: |
          BOT_USER="${APP_SLUG}[bot]"
          BOT_ID=$(GH_TOKEN="${HOMEBREW_GITHUB_API_TOKEN}" gh api "/users/${BOT_USER}" --jq .id)
          export HOMEBREW_GIT_NAME="${BOT_USER}"
          export HOMEBREW_GIT_EMAIL="${BOT_ID}+${BOT_USER}@users.noreply.github.com"
          brew tap starhaven-io/homebrew-tap
          brew bump-cask-pr --no-fork --version "${VERSION}" starhaven-io/tap/macosdb
