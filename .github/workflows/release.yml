name: Release

on:
  workflow_dispatch:

defaults:
  run:
    # No -x: this workflow handles signing/notarization secrets, generated
    # keychain passwords, and short-lived app tokens.
    shell: bash -euo pipefail {0}

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}

jobs:
  validate-dispatch:
    name: Validate dispatch
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions: {}
    steps:
      - name: Require main branch
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release workflow must be dispatched from main, got ${REF_NAME}."
            exit 1
          fi

  build:
    name: Build
    needs: validate-dispatch
    runs-on: macos-26
    timeout-minutes: 60
    environment:
      name: release
      deployment: false
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact: ${{ steps.package.outputs.artifact }}
    permissions:
      contents: read
      attestations: write # required to generate build provenance attestations
      id-token: write # required to generate build provenance attestations
    env:
      TEMPORARY_KEYCHAIN_FILE: "macosdb_signing.keychain-db"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 'static let current' Sources/macosdb/Version.swift | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not extract version from Sources/macosdb/Version.swift"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and unlock temporary macOS keychain
        run: |
          # Keep xtrace disabled here: this password is generated at runtime and is not a registered secret.
          TEMPORARY_KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          echo "::add-mask::${TEMPORARY_KEYCHAIN_PASSWORD}"
          TEMPORARY_KEYCHAIN_PATH="${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          security create-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${TEMPORARY_KEYCHAIN_PATH}"
          security unlock-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"

      - name: Import certificate into keychain
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set +x  # don't xtrace the certificate or its password
          echo -n "${DEVELOPER_ID_CERTIFICATE}" | base64 --decode --output="${RUNNER_TEMP}/certificate.p12"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" \
            -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -t cert -f pkcs12 -A
          rm -f "${RUNNER_TEMP}/certificate.p12"
          security list-keychain -d user -s "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"

      - name: Build release binary
        run: |
          swift build -c release --arch arm64 --product macosdb
          echo "BINARY=$(swift build -c release --arch arm64 --show-bin-path)/macosdb" >> "${GITHUB_ENV}"

      - name: Codesign binary
        run: |
          codesign --sign "Developer ID Application: Patrick Linnane (${DEVELOPMENT_TEAM})" \
            --options runtime \
            "${BINARY}"

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          set +x  # keep the notarization password out of the xtrace log
          mkdir -p "${RUNNER_TEMP}/notarize-staging"
          cp "${BINARY}" "${RUNNER_TEMP}/notarize-staging/"
          ditto -c -k "${RUNNER_TEMP}/notarize-staging" "${RUNNER_TEMP}/macosdb-notarize.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/macosdb-notarize.zip" \
            --apple-id "${APPLE_ID}" \
            --team-id "${DEVELOPMENT_TEAM}" \
            --password "${NOTARIZATION_PASSWORD}" \
            --wait

      - name: Clean up temporary keychain
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" ]]; then
            security delete-keychain "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          fi

      - name: Package
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ARTIFACT="macosdb-${VERSION}-aarch64-apple-darwin"
          mkdir -p staging
          cp "${BINARY}" staging/macosdb
          cp LICENSE staging/
          /usr/bin/tar --no-mac-metadata --no-xattrs -czf "${ARTIFACT}.tar.gz" -C staging .
          echo "artifact=${ARTIFACT}" >> "${GITHUB_OUTPUT}"

      - name: Generate build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "${{ steps.package.outputs.artifact }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: "${{ steps.package.outputs.artifact }}.tar.gz"
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-slim
    timeout-minutes: 60
    environment:
      name: release
      deployment: false
    permissions:
      contents: write # required to create tags and GitHub releases
    outputs:
      version: ${{ needs.build.outputs.version }}
    env:
      TAG: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gh api "repos/${REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${COMMIT_SHA}"

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: artifacts

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT: ${{ needs.build.outputs.artifact }}
        run: |
          # Anchor notes to the last published release, not just the newest tag,
          # so an orphaned tag from a failed release run can't truncate them.
          NOTES_START=$(gh release list \
            --repo "${REPOSITORY}" \
            --limit 100 \
            --json tagName,isDraft,publishedAt \
            --jq 'map(select(.isDraft | not)) | sort_by(.publishedAt) | last | .tagName // empty')

          create_args=("${TAG}" --repo "${REPOSITORY}" --title "${TAG}" --generate-notes)
          if [[ -n "${NOTES_START}" ]]; then
            create_args+=(--notes-start-tag "${NOTES_START}")
            echo "Generating notes since last published release: ${NOTES_START}"
          else
            echo "No prior published release; generating notes from the repository start"
          fi

          gh release create "${create_args[@]}" "artifacts/${ARTIFACT}.tar.gz"
          gh release view "${TAG}" \
            --repo "${REPOSITORY}" \
            --json body \
            --jq '.body' > "${RUNNER_TEMP}/raw_notes.md"

      - name: Format release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/format-release-notes.py \
            "${RUNNER_TEMP}/raw_notes.md" "${TAG}" \
            > "${RUNNER_TEMP}/formatted_notes.md"
          gh release edit "${TAG}" \
            --repo "${REPOSITORY}" \
            --notes-file "${RUNNER_TEMP}/formatted_notes.md"

  bump-cask:
    name: Bump Homebrew cask
    needs: release
    runs-on: macos-26
    timeout-minutes: 60
    environment:
      name: release
      deployment: false
    permissions: {}
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Mint bot token for tap
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Bump Homebrew cask
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.tap-token.outputs.token }}
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_ENV_HINTS: 1
          APP_SLUG: ${{ steps.tap-token.outputs.app-slug }}
        run: |
          BOT_USER="${APP_SLUG}[bot]"
          BOT_ID=$(gh api "/users/${BOT_USER}" --jq .id)
          export HOMEBREW_GIT_NAME="${BOT_USER}"
          export HOMEBREW_GIT_EMAIL="${BOT_ID}+${BOT_USER}@users.noreply.github.com"
          brew tap starhaven-io/tap
          brew trust starhaven-io/tap
          brew bump-cask-pr --no-fork --version "${VERSION}" starhaven-io/tap/macosdb

          BRANCH_VERSION="${VERSION//,/-}"
          BRANCH_VERSION="${BRANCH_VERSION//:/-}"
          BRANCH="bump-macosdb-${BRANCH_VERSION}"
          PR_NUMBER=$(gh pr list \
            --repo starhaven-io/homebrew-tap \
            --head "${BRANCH}" \
            --state open \
            --json number,headRepositoryOwner \
            --jq 'map(select(.headRepositoryOwner.login == "starhaven-io")) | .[0].number // ""' || true)
          if [ -n "${PR_NUMBER}" ]; then
            gh pr merge "${PR_NUMBER}" --repo starhaven-io/homebrew-tap --auto --squash \
              || echo "::warning::could not enable auto-merge for starhaven-io/homebrew-tap#${PR_NUMBER}"
          else
            echo "::warning::could not find open Homebrew cask bump PR for ${BRANCH}"
          fi
